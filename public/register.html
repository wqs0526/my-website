<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register | Wellness Challenge</title>
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous" defer></script>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Get URL -->
    <script src="js/getCurrentURL.js" defer></script>
    <!-- Get jQuery -->
    <script src="js/queryCmds.js" defer></script>
    <!-- JS EXTERNAL LINK -->
    <script src="js/register.js" defer></script>
    <!-- jQuery -->
    <script
      src="https://code.jquery.com/jquery-3.7.0.min.js"
      integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g="
      crossorigin="anonymous" defer></script>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand" href="login.html"><b>Wellness</b> Challenge</a>
    <div class="ms-auto">
      <a class="btn btn-outline-secondary btn-sm" href="login.html">Login</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
      <div class="card p-4">
        <h1 class="h4 mb-1">Create your account</h1>
        <div class="small-hint mb-4">Register first, then login to start earning points.</div>

        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" id="username" placeholder="Enter your full name">
            <div class="invalid-feedback"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" id="email" type="email" placeholder="Enter your email">
            <div class="invalid-feedback"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" id="password" type="password" minlength="6" placeholder="Min 6 characters">
            <div class="invalid-feedback">Password must be at least 6 characters.</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input class="form-control" id="confirmPassword" type="password" placeholder="Confirm your password">
            <div class="invalid-feedback">Passwords must match.</div>
          </div>

          <button class="btn btn-brand w-100" id="registerBtn">Create account</button>
        </form>

        <div class="mt-3 text-center footer-note">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="appToast" class="toast text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div id="toastBody" class="toast-body">Done</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

</body>
</html>
